<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent !important;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .calculator {
      background: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 20px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .display {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px 16px;
      margin-bottom: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .previous-operand {
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 6px;
    }

    .current-operand {
      color: rgba(255, 255, 255, 0.95);
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -1px;
      line-height: 1.1;
      overflow-x: auto;
      white-space: nowrap;
    }

    .current-operand::-webkit-scrollbar {
      height: 2px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .btn {
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 16px 8px;
      font-size: 20px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08) !important;
      transform: scale(0.96);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn:active {
      transform: scale(0.93);
      transition: 0.03s;
    }

    .btn-operator {
      border-color: rgba(135, 184, 127, 0.3);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn-operator:hover {
      background: rgba(135, 184, 127, 0.15) !important;
      border-color: rgba(135, 184, 127, 0.5);
    }

    .btn-equals {
      border-color: rgba(135, 184, 127, 0.4);
      color: white;
    }

    .btn-equals:hover {
      background: rgba(135, 184, 127, 0.25) !important;
      border-color: rgba(135, 184, 127, 0.6);
    }

    .btn-clear:hover {
      background: rgba(255, 100, 100, 0.15) !important;
      border-color: rgba(255, 100, 100, 0.3);
    }

    /* Responsive adjustments */
    @media (max-width: 420px), (max-height: 600px) {
      .calculator { padding: 12px; }
      .display { padding: 12px 12px; margin-bottom: 12px; }
      .btn { padding: 10px 4px; font-size: 18px; }
      .current-operand { font-size: 32px; }
      .buttons { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="previous-operand" id="previous"></div>
      <div class="current-operand" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="btn btn-clear" data-action="clear">AC</button>
      <button class="btn btn-clear" data-action="delete">⌫</button>
      <button class="btn btn-operator" data-operator="%">%</button>
      <button class="btn btn-operator" data-operator="/">÷</button>
      
      <button class="btn" data-number="7">7</button>
      <button class="btn" data-number="8">8</button>
      <button class="btn" data-number="9">9</button>
      <button class="btn btn-operator" data-operator="*">×</button>
      
      <button class="btn" data-number="4">4</button>
      <button class="btn" data-number="5">5</button>
      <button class="btn" data-number="6">6</button>
      <button class="btn btn-operator" data-operator="-">−</button>
      
      <button class="btn" data-number="1">1</button>
      <button class="btn" data-number="2">2</button>
      <button class="btn" data-number="3">3</button>
      <button class="btn btn-operator" data-operator="+">+</button>
      
      <button class="btn" data-number="0">0</button>
      <button class="btn" data-number=".">.</button>
      <button class="btn btn-equals" data-action="equals">=</button>
      <button class="btn btn-operator" data-operator="^">xⁿ</button>
    </div>
  </div>

  <script>
    (function() {
      let previous = '';
      let current = '0';
      let operation = null;
      let resetScreen = false;

      const previousEl = document.getElementById('previous');
      const currentEl = document.getElementById('current');

      function updateDisplay() {
        let displayCurrent = current;
        if (!isNaN(parseFloat(displayCurrent)) && !displayCurrent.includes('Error')) {
          const parts = displayCurrent.split('.');
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
          displayCurrent = parts.join('.');
        }
        currentEl.textContent = displayCurrent;

        let displayPrevious = '';
        if (previous !== '') {
          let formattedPrev = previous;
          if (!isNaN(parseFloat(formattedPrev))) {
            const parts = formattedPrev.split('.');
            parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            formattedPrev = parts.join('.');
          }
          const opMap = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%', '^': '^' };
          displayPrevious = `${formattedPrev} ${opMap[operation] || ''}`;
        }
        previousEl.textContent = displayPrevious;
      }

      function appendNumber(num) {
        if (resetScreen) {
          current = '';
          resetScreen = false;
        }
        if (num === '.' && current.includes('.')) return;
        if (current === '0' && num !== '.') {
          current = num;
        } else {
          current += num;
        }
        if (current.length > 16) current = current.slice(0, 16);
        updateDisplay();
      }

      function chooseOperation(op) {
        if (current === '') return;
        if (previous !== '') compute();
        operation = op;
        previous = current;
        current = '';
        resetScreen = false;
        updateDisplay();
      }

      function compute() {
        let result;
        const prev = parseFloat(previous);
        const curr = parseFloat(current);
        if (isNaN(prev) || isNaN(curr)) return;

        const ops = {
          '+': () => prev + curr,
          '-': () => prev - curr,
          '*': () => prev * curr,
          '/': () => prev / curr,
          '%': () => prev % curr,
          '^': () => Math.pow(prev, curr)
        };

        if (ops[operation]) {
          result = ops[operation]();
          if (operation === '/' && curr === 0) {
            current = 'Error';
            previous = '';
            operation = null;
            updateDisplay();
            setTimeout(() => { current = '0'; updateDisplay(); }, 1200);
            return;
          }
          result = Math.round(result * 10000000000) / 10000000000;
          current = result.toString().length > 16 ? result.toExponential(8) : result.toString();
          operation = null;
          previous = '';
          resetScreen = true;
          updateDisplay();
        }
      }

      function clear() {
        current = '0';
        previous = '';
        operation = null;
        resetScreen = false;
        updateDisplay();
      }

      function deleteLast() {
        if (resetScreen) {
          clear();
          return;
        }
        if (current.length === 1 || current === '0') {
          current = '0';
        } else {
          current = current.slice(0, -1);
        }
        updateDisplay();
      }

      document.querySelectorAll('[data-number]').forEach(btn => {
        btn.addEventListener('click', () => appendNumber(btn.dataset.number));
      });
      document.querySelectorAll('[data-operator]').forEach(btn => {
        btn.addEventListener('click', () => chooseOperation(btn.dataset.operator));
      });
      document.querySelector('[data-action="clear"]').addEventListener('click', clear);
      document.querySelector('[data-action="delete"]').addEventListener('click', deleteLast);
      document.querySelector('[data-action="equals"]').addEventListener('click', compute);

      document.addEventListener('keydown', (e) => {
        const key = e.key;
        if (/[0-9]/.test(key)) { appendNumber(key); e.preventDefault(); }
        if (key === '.') { appendNumber('.'); e.preventDefault(); }
        if (key === '+' || key === '-') { chooseOperation(key); e.preventDefault(); }
        if (key === '*') { chooseOperation('*'); e.preventDefault(); }
        if (key === '/') { chooseOperation('/'); e.preventDefault(); }
        if (key === '%') { chooseOperation('%'); e.preventDefault(); }
        if (key === '^') { chooseOperation('^'); e.preventDefault(); }
        if (key === 'Enter' || key === '=') { compute(); e.preventDefault(); }
        if (key === 'Escape') { clear(); e.preventDefault(); }
        if (key === 'Backspace') { deleteLast(); e.preventDefault(); }
      });
    })();
  </script>
</body>
</html>
