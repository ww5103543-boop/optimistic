<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator UI</title>
  <style>
    :root {
      --text-color: #ffffff;
      --bg-gradient: radial-gradient(circle at center, #2d3e31 0%, #1a1d1a 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #000;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main Container mimicking the image window */
    .calculator {
      width: 320px;
      height: 520px;
      background: var(--bg-gradient);
      position: relative;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    /* Top bar mimics window controls */
    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .display {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-end;
      padding: 10px;
    }

    .current-operand {
      color: var(--text-color);
      font-size: 80px;
      font-weight: 300;
      line-height: 1;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
      margin-top: auto;
    }

    .btn {
      background: transparent;
      border: none;
      color: var(--text-color);
      font-size: 22px;
      font-weight: 500;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Specific icon for backspace */
    .backspace-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="window-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
        <span>Calculator</span>
      </div>
      <div style="letter-spacing: 5px; font-size: 12px;">— ▢ ✕</div>
    </div>

    <div class="display">
      <div class="current-operand" id="display">0</div>
    </div>

    <div class="buttons-grid">
      <button class="btn" onclick="backspace()">
        <svg class="backspace-icon" viewBox="0 0 24 24"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
      </button>
      <button class="btn" onclick="clearDisplay()">ac</button>
      <button class="btn">+/-</button>
      <button class="btn" onclick="append('/')">/</button>

      <button class="btn" onclick="append('7')">7</button>
      <button class="btn" onclick="append('8')">8</button>
      <button class="btn" onclick="append('9')">9</button>
      <button class="btn" onclick="append('*')">*</button>

      <button class="btn" onclick="append('4')">4</button>
      <button class="btn" onclick="append('5')">5</button>
      <button class="btn" onclick="append('6')">6</button>
      <button class="btn" onclick="append('-')">-</button>

      <button class="btn" onclick="append('1')">1</button>
      <button class="btn" onclick="append('2')">2</button>
      <button class="btn" onclick="append('3')">3</button>
      <button class="btn" onclick="append('+')">+</button>

      <button class="btn" onclick="append('0')">0</button>
      <button class="btn" onclick="append('.')">.</button>
      <button class="btn" style="grid-column: span 2;" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let currentInput = '0';

    function updateDisplay() {
      display.innerText = currentInput;
    }

    function append(char) {
      if (currentInput === '0' && char !== '.') {
        currentInput = char;
      } else {
        currentInput += char;
      }
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      updateDisplay();
    }

    function backspace() {
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = '0';
      }
      updateDisplay();
    }

    function calculate() {
      try {
        currentInput = eval(currentInput).toString();
      } catch {
        currentInput = "Error";
      }
      updateDisplay();
    }
  </script>
</body>
</html>
