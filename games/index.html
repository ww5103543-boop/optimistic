<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: transparent;
      --chrome-bg: transparent;
      --chrome-border: rgba(255, 255, 255, 0.12);
      --text: rgba(255, 255, 255, 0.7);
      --text-dim: rgba(255, 255, 255, 0.4);
      --text-bright: rgba(255, 255, 255, 0.95);
    }

    body {
      background: transparent;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 30px 40px 20px 40px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 8px;
      font-style: italic;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
    }

    .header .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
      font-weight: 400;
    }

    #games {
      flex: 1;
      padding: 20px 40px;
      min-height: 500px;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 300px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.2rem;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      margin: 20px;
    }

    .footer {
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-brand {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
    }

    .footer-brand span {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .lumin-game, [data-game], .game-card {
      background: rgba(0, 0, 0, 0.35) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      border-radius: 16px !important;
      transition: all 0.2s ease !important;
    }

    .lumin-game:hover, [data-game]:hover, .game-card:hover {
      background: rgba(0, 0, 0, 0.5) !important;
      border-color: rgba(255, 255, 255, 0.2) !important;
      transform: translateY(-2px);
    }

    .lumin-game img, [data-game] img, .game-card img {
      filter: brightness(0.95) contrast(1.05);
    }

    .lumin-game span, [data-game] span, .game-card span,
    .lumin-game h3, [data-game] h3, .game-card h3,
    .lumin-game p, [data-game] p, .game-card p {
      color: rgba(255, 255, 255, 0.85) !important;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Optimistic Games</h1>
    <p class="subtitle" id="game-count">Browse and play games</p>
  </div>

  <div id="games">
    <div class="loading">Loading games...</div>
  </div>

  <div class="footer">
    <div class="footer-brand"><span>Optimistic Games</span></div>
    <div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark'
    });

    setTimeout(() => {
      const gamesContainer = document.querySelector('#games');
      const gameCards = gamesContainer.querySelectorAll('[data-game], .game-card, .lumin-game');
      if (gameCards.length > 0) {
        document.getElementById('game-count').textContent = 'Browse and play ' + gameCards.length.toLocaleString() + ' games';
      }
      
      const style = document.createElement('style');
      style.textContent = `
        .lumin-container, .lumin-grid, .lumin-game-list {
          background: transparent !important;
        }
        .lumin-game {
          background: rgba(0, 0, 0, 0.35) !important;
          backdrop-filter: blur(12px) !important;
          -webkit-backdrop-filter: blur(12px) !important;
          border: 1px solid rgba(255, 255, 255, 0.1) !important;
          border-radius: 16px !important;
          transition: all 0.2s ease !important;
        }
        .lumin-game:hover {
          background: rgba(0, 0, 0, 0.55) !important;
          border-color: rgba(255, 255, 255, 0.2) !important;
          transform: translateY(-2px);
        }
        .lumin-game-title, .lumin-game-name {
          color: rgba(255, 255, 255, 0.9) !important;
        }
        .lumin-game-description {
          color: rgba(255, 255, 255, 0.6) !important;
        }
        .lumin-search input, .lumin-filter input {
          background: rgba(0, 0, 0, 0.4) !important;
          backdrop-filter: blur(8px) !important;
          border: 1px solid rgba(255, 255, 255, 0.12) !important;
          color: white !important;
        }
        .lumin-search input::placeholder, .lumin-filter input::placeholder {
          color: rgba(255, 255, 255, 0.4) !important;
        }
      `;
      document.head.appendChild(style);
    }, 3000);
  </script>

</body>
</html>
