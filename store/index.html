<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimistic Store</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #87b87f;
    --mint-dark: #5a8a52;
    --mint-glow: rgba(135,184,127,0.18);
    --bg: transparent;
    --surface: rgba(20,26,20,0.45);
    --surface2: rgba(28,34,28,0.5);
    --border: rgba(135,184,127,0.1);
    --text: #e8eaed;
    --text-muted: #7a9070;
    --font: 'Noto Sans', sans-serif;
    --mono: 'Noto Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: var(--font); font-size: 13px; color: var(--text);
    background: transparent;
    user-select: none;
  }

  .store-root {
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
    background: transparent;
    backdrop-filter: blur(20px);
    overflow: hidden;
  }

  .store-topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    background: rgba(12,16,12,0.45);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .store-logo {
    display: flex; align-items: center; gap: 7px;
    font-size: 14px; font-weight: 600; color: var(--mint);
  }
  .store-logo svg { width: 18px; height: 18px; fill: var(--mint); }
  .store-search {
    flex: 1; max-width: 340px;
    background: rgba(0,0,0,0.2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
    color: var(--text); font-family: var(--font); font-size: 12px; outline: none;
    transition: border-color 0.2s;
  }
  .store-search:focus { border-color: rgba(135,184,127,0.35); }
  .store-search::placeholder { color: #3a5a3a; }

  .store-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }

  .store-featured {
    border-radius: 10px; overflow: hidden;
    background: linear-gradient(135deg, rgba(45,80,40,0.35), rgba(20,30,20,0.5));
    border: 1px solid rgba(135,184,127,0.15);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 20px;
    position: relative;
    flex-shrink: 0;
  }
  .store-featured::before {
    content: ''; position: absolute; inset: 0;
    background: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=800') center/cover no-repeat;
    opacity: 0.06; border-radius: 10px;
  }
  .feat-icon {
    width: 64px; height: 64px; border-radius: 14px;
    object-fit: contain; flex-shrink: 0; position: relative; z-index: 1;
    background: rgba(0,0,0,0.2); padding: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .feat-info { flex: 1; position: relative; z-index: 1; }
  .feat-badge { font-size: 10px; color: var(--mint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .feat-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .feat-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .feat-install-btn {
    padding: 9px 20px; border-radius: 7px; cursor: pointer; flex-shrink: 0; position: relative; z-index: 1;
    background: linear-gradient(135deg, var(--mint), var(--mint-dark));
    border: none; color: #0a150a; font-family: var(--font); font-size: 13px; font-weight: 700;
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .feat-install-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(135,184,127,0.3); }
  .feat-install-btn.installed { background: rgba(135,184,127,0.12); color: var(--mint); border: 1px solid rgba(135,184,127,0.25); }

  .store-section-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: -8px;
  }

  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }

  .app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column;
  }
  .app-card:hover { border-color: rgba(135,184,127,0.25); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

  .app-card-header {
    padding: 14px 14px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .app-card-icon {
    width: 44px; height: 44px; border-radius: 10px; object-fit: contain; flex-shrink: 0;
    background: rgba(0,0,0,0.2); padding: 6px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .app-card-meta { flex: 1; min-width: 0; }
  .app-card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .app-card-category { font-size: 10.5px; color: var(--text-muted); }
  .app-card-desc { padding: 0 14px 10px; font-size: 11.5px; color: var(--text-muted); line-height: 1.5; flex: 1; }
  .app-card-footer {
    padding: 8px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(135,184,127,0.05);
    background: rgba(0,0,0,0.15);
  }
  .app-card-size { font-size: 10.5px; color: #3a5a3a; font-family: var(--mono); }
  .app-card-rating { font-size: 10.5px; color: #e8a838; }

  .install-btn {
    padding: 5px 14px; border-radius: 5px; cursor: pointer;
    background: rgba(135,184,127,0.1); border: 1px solid rgba(135,184,127,0.25);
    color: var(--mint); font-family: var(--font); font-size: 11.5px; font-weight: 600;
    transition: all 0.15s; white-space: nowrap;
  }
  .install-btn:hover { background: rgba(135,184,127,0.2); }
  .install-btn.installing {
    background: rgba(135,184,127,0.08); color: var(--text-muted);
    border-color: rgba(135,184,127,0.1); cursor: default;
  }
  .install-btn.installed {
    background: rgba(135,184,127,0.05); color: #4a6a44;
    border-color: rgba(135,184,127,0.08); cursor: default;
  }
  .install-btn.open-btn {
    background: var(--mint-glow); color: var(--mint);
    border-color: rgba(135,184,127,0.3); cursor: pointer;
  }
  .install-btn.open-btn:hover { background: rgba(135,184,127,0.25); }

  .install-progress {
    height: 2px; background: rgba(135,184,127,0.08);
    overflow: hidden; flex-shrink: 0;
  }
  .install-progress-bar {
    height: 100%; background: var(--mint);
    width: 0%; transition: width 0.3s ease;
    border-radius: 2px;
  }

  #store-toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(20,26,20,0.65); border: 1px solid var(--border);
    border-left: 3px solid var(--mint);
    border-radius: 8px; padding: 10px 16px;
    font-size: 12.5px; color: var(--text);
    pointer-events: none; z-index: 999;
    opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #store-toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(135,184,127,0.15); border-radius: 2px; }
</style>
<base target="_blank">
</head>
<body>

<div class="store-root">
  <div class="store-topbar">
    <div class="store-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      Optimistic Store
    </div>
    <input type="text" class="store-search" placeholder="Search apps..." id="store-search-input" oninput="filterApps(this.value)">
  </div>

  <div class="store-body" id="store-body">
    <div class="store-featured" id="featured-banner">
      <img class="feat-icon" src="https://www.roblox.com/favicon.ico" alt="Roblox" id="feat-icon">
      <div class="feat-info">
        <div class="feat-badge">Featured App</div>
        <div class="feat-title" id="feat-title">Roblox</div>
        <div class="feat-desc" id="feat-desc">Play millions of 3D experiences with friends on Roblox - the ultimate platform for user-generated games and social experiences.</div>
      </div>
      <button class="feat-install-btn" id="feat-install-btn" onclick="installFeatured()">Install</button>
    </div>

    <div class="store-section-title" id="section-title-all">All Apps</div>
    <div class="store-grid" id="app-grid"></div>
  </div>
</div>

<div id="store-toast"></div>

<script>
const STORE_INSTALLED_KEY = 'optimistic.store.installed';
const OPT_CUSTOM_APPS_KEY = 'optimistic.custom.apps';

const STORE_APPS = [
  {
    id: 'roblox', name: 'Roblox', category: 'Games',
    icon: 'https://www.roblox.com/favicon.ico',
    desc: 'Play millions of 3D user-created games with friends.',
    url: '/apps/roblox.html',
    size: '4.2 MB', rating: '4.8', featured: true
  },
  {
    id: 'xbox', name: 'Xbox', category: 'Games',
    icon: 'https://www.xbox.com/favicon.ico',
    desc: 'Play games, connect with friends, and discover new titles.',
    url: '/apps/xbox.html',
    size: '6.5 MB', rating: '4.2'
  },
  {
    id: 'discord', name: 'Discord', category: 'Social',
    icon: 'https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg',
    desc: 'Voice, video and text - your community in one place.',
    url: '/apps/discord.html',
    size: '2.8 MB', rating: '4.9'
  },
  {
    id: 'minecraft', name: 'Minecraft', category: 'Games',
    icon: 'https://www.minecraft.net/favicon.ico',
    desc: 'Build and explore infinite blocky worlds.',
    url: '/apps/minecraft.html',
    size: '8.1 MB', rating: '4.9'
  },
  {
    id: 'spotify', name: 'Spotify', category: 'Media',
    icon: 'https://open.spotify.com/favicon.ico',
    desc: 'Millions of songs and podcasts at your fingertips.',
    url: '/apps/spotify.html',
    size: '2.0 MB', rating: '4.7'
  },
  {
    id: 'tiktok', name: 'TikTok', category: 'Media',
    icon: 'https://www.tiktok.com/favicon.ico',
    desc: 'Watch and create short-form videos with music and effects.',
    url: '/apps/tiktok.html',
    size: '3.5 MB', rating: '4.3'
  },
];

let currentTab = 'all';
let installedApps = {};
let installingApps = new Set();

function getInstalled() {
  try { return JSON.parse(localStorage.getItem(STORE_INSTALLED_KEY) || '{}'); }
  catch { return {}; }
}
function saveInstalled(obj) {
  localStorage.setItem(STORE_INSTALLED_KEY, JSON.stringify(obj));
}
function getCustomApps() {
  try { return JSON.parse(localStorage.getItem(OPT_CUSTOM_APPS_KEY) || '[]'); }
  catch { return []; }
}
function saveCustomApps(arr) {
  localStorage.setItem(OPT_CUSTOM_APPS_KEY, JSON.stringify(arr));
}

function toast(msg) {
  const el = document.getElementById('store-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2800);
}

function installApp(appId, btnEl, progressEl) {
  if (installingApps.has(appId)) return;
  const app = STORE_APPS.find(a => a.id === appId);
  if (!app) return;

  installingApps.add(appId);
  btnEl.textContent = 'Installing...';
  btnEl.className = 'install-btn installing';
  btnEl.disabled = true;

  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 18 + 8;
    if (progress > 95) progress = 95;
    if (progressEl) progressEl.style.width = progress + '%';
  }, 150);

  setTimeout(() => {
    clearInterval(interval);
    if (progressEl) progressEl.style.width = '100%';

    setTimeout(() => {
      installingApps.delete(appId);
      installedApps[appId] = true;
      saveInstalled(installedApps);

      const customApps = getCustomApps();
      if (!customApps.find(a => a.id === appId)) {
        customApps.push({
          id: appId,
          label: app.name,
          icon: app.icon,
          url: app.url,
          category: app.category,
          installedAt: Date.now()
        });
        saveCustomApps(customApps);
      }

      try {
        window.parent.postMessage({ type: 'app-installed', app: {
          id: appId, label: app.name, icon: app.icon,
          url: app.url
        }}, '*');
      } catch(e) {}

      btnEl.textContent = 'Open';
      btnEl.className = 'install-btn open-btn';
      btnEl.disabled = false;
      btnEl.onclick = () => openInstalledApp(appId);
      if (progressEl) progressEl.style.width = '0%';

      toast(app.name + ' installed successfully');
    }, 300);
  }, 1800 + Math.random() * 600);
}

function openInstalledApp(appId) {
  const app = STORE_APPS.find(a => a.id === appId);
  if (!app) return;
  try {
    window.parent.postMessage({ type: 'open-app', appId: appId, url: app.url }, '*');
  } catch(e) {}
  toast('Opening app...');
}

function installFeatured() {
  const featuredApp = STORE_APPS.find(a => a.featured);
  if (!featuredApp) return;
  const btn = document.getElementById('feat-install-btn');

  if (installedApps[featuredApp.id]) {
    openInstalledApp(featuredApp.id);
    return;
  }

  btn.textContent = 'Installing...';
  btn.disabled = true;
  installApp(featuredApp.id, btn, null);

  setTimeout(() => {
    if (installedApps[featuredApp.id]) {
      btn.textContent = 'Open';
      btn.className = 'feat-install-btn installed';
      btn.disabled = false;
      btn.onclick = () => openInstalledApp(featuredApp.id);
    }
  }, 3000);
}

function renderApps(tab = 'all', filter = '') {
  const grid = document.getElementById('app-grid');
  const filtered = STORE_APPS.filter(a => {
    const matchTab = tab === 'all' || a.tab === tab;
    const matchFilter = !filter || a.name.toLowerCase().includes(filter.toLowerCase()) || a.desc.toLowerCase().includes(filter.toLowerCase());
    return matchTab && matchFilter;
  });

  document.getElementById('featured-banner').style.display = filter ? 'none' : '';

  grid.innerHTML = filtered.map(app => {
    const isInstalled = !!installedApps[app.id];
    const isInstalling = installingApps.has(app.id);
    const btnClass = isInstalling ? 'installing' : isInstalled ? 'open-btn' : '';
    const btnText = isInstalling ? 'Installing...' : isInstalled ? 'Open' : 'Install';
    return `
      <div class="app-card" id="card-${app.id}">
        <div class="app-card-header">
          <img class="app-card-icon" src="${app.icon}" alt="${app.name}" onerror="this.src='data:image/svg+xml,<svg viewBox=\'0 0 24 24\' fill=\'%2387b87f\' xmlns=\'http://www.w3.org/2000/svg\'><path d=\'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z\'/></svg>'">
          <div class="app-card-meta">
            <div class="app-card-name">${app.name}</div>
            <div class="app-card-category">${app.category}</div>
          </div>
        </div>
        <div class="app-card-desc">${app.desc}</div>
        <div class="install-progress"><div class="install-progress-bar" id="prog-${app.id}"></div></div>
        <div class="app-card-footer">
          <div>
            <div class="app-card-size">${app.size}</div>
            <div class="app-card-rating">${app.rating}</div>
          </div>
          <button class="install-btn ${btnClass}" id="btn-${app.id}" onclick="handleInstallClick('${app.id}')" ${isInstalling?'disabled':''}>
            ${btnText}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function handleInstallClick(appId) {
  if (installedApps[appId]) {
    openInstalledApp(appId);
    return;
  }
  const btn = document.getElementById('btn-' + appId);
  const prog = document.getElementById('prog-' + appId);
  installApp(appId, btn, prog);
}

function filterApps(val) {
  renderApps(currentTab, val);
}

installedApps = getInstalled();
renderApps();

const featApp = STORE_APPS.find(a => a.featured);
if (featApp && installedApps[featApp.id]) {
  const btn = document.getElementById('feat-install-btn');
  if (btn) { btn.textContent = 'Open'; btn.className = 'feat-install-btn installed'; btn.onclick = () => openInstalledApp(featApp.id); }
}
</script>
</body>
</html>
