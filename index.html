<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimistic Desktop</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #desktop {
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=3540&ixlib=rb-4.0.3') no-repeat center center fixed;
            background-size: cover;
            height: calc(100% - 40px);
            position: relative;
        }
        #taskbar {
            background-color: rgba(45, 45, 45, 0.95);
            height: 40px;
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            align-items: center;
            color: white;
            z-index: 1000;
        }
        #start-menu-button {
            padding: 0 15px;
            cursor: pointer;
            height: 100%;
            display: flex;
            align-items: center;
            background-color: #3e3e3e;
        }
        #start-menu-button:hover {
            background-color: #4e4e4e;
        }
        #start-menu {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 300px;
            background-color: #2b2b2b;
            color: white;
            display: none;
            flex-direction: column;
            border-top-right-radius: 5px;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.5);
        }
        .start-item {
            padding: 10px 20px;
            cursor: pointer;
        }
        .start-item:hover {
            background-color: #3e3e3e;
        }
        #desktop-icons {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }
        .icon {
            width: 80px;
            text-align: center;
            color: white;
            cursor: pointer;
            text-shadow: 1px 1px 2px black;
        }
        .icon img {
            width: 50px;
            height: 50px;
        }
        #window-container {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 800px;
            height: 600px;
            background: white;
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
        }
        #window-header {
            background: #3e3e3e;
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }
        #close-btn {
            background: #cc0000;
            color: white;
            border: none;
            cursor: pointer;
            padding: 2px 8px;
        }
        iframe {
            flex-grow: 1;
            border: none;
        }
        #system-tray {
            margin-left: auto;
            padding: 0 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="desktop">
    <div id="desktop-icons">
        <div class="icon" onclick="openBrowser()">
            <img src="https://cdn-icons-png.flaticon.com/512/888/888846.png" alt="Browser">
            <div>Browser</div>
        </div>
        <div class="icon" onclick="alert('Optimistic System Settings')">
            <img src="https://cdn-icons-png.flaticon.com/512/2040/2040504.png" alt="Settings">
            <div>Settings</div>
        </div>
    </div>

    <div id="window-container">
        <div id="window-header">
            <span>Optimistic Browser</span>
            <button id="close-btn" onclick="closeBrowser()">X</button>
        </div>
        <iframe src="https://www.bing.com" id="browser-iframe"></iframe>
    </div>

    <div id="start-menu">
        <div class="start-item" onclick="openBrowser()">Web Browser</div>
        <div class="start-item" onclick="alert('Optimistic Terminal')">Terminal</div>
        <div class="start-item" onclick="alert('Software Manager')">Software Manager</div>
        <hr style="width: 100%; border: 0.5px solid #444;">
        <div class="start-item" onclick="location.reload()">Restart</div>
    </div>
</div>

<div id="taskbar">
    <div id="start-menu-button" onclick="toggleStartMenu()">
        <strong>Optimistic</strong>
    </div>
    <div id="system-tray">
        <span id="clock"></span>
    </div>
</div>

<script>
    function toggleStartMenu() {
        const menu = document.getElementById('start-menu');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function openBrowser() {
        document.getElementById('window-container').style.display = 'flex';
        document.getElementById('start-menu').style.display = 'none';
    }

    function closeBrowser() {
        document.getElementById('window-container').style.display = 'none';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    window.onclick = function(event) {
        if (!event.target.closest('#start-menu-button') && !event.target.closest('#start-menu')) {
            document.getElementById('start-menu').style.display = 'none';
        }
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
