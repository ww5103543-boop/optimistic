<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimistic Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'SF Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal {
            background: rgba(10, 14, 10, 0.85);
            backdrop-filter: blur(20px);
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(135, 184, 127, 0.2);
            overflow: hidden;
        }

        .header {
            background: rgba(26, 30, 26, 0.7);
            padding: 12px 20px;
            border-bottom: 1px solid rgba(135, 184, 127, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            color: #87b87f;
            font-weight: bold;
            font-size: 13px;
        }

        .status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .status-connected {
            color: #87b87f;
            background: rgba(135, 184, 127, 0.15);
        }
        .status-disconnected {
            color: #ff5f57;
            background: rgba(255, 95, 87, 0.15);
        }
        .status-connecting {
            color: #febc2e;
            background: rgba(254, 188, 46, 0.15);
        }

        .output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: transparent;
        }

        .line {
            font-family: monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            color: #e0e0e0;
            margin-bottom: 2px;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: rgba(13, 18, 8, 0.8);
            border-top: 1px solid rgba(135, 184, 127, 0.2);
        }

        .prompt {
            color: #87b87f;
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #b8d8b0;
            font-family: monospace;
            font-size: 12px;
        }

        .input:disabled {
            opacity: 0.5;
        }

        .output::-webkit-scrollbar {
            width: 6px;
        }
        .output::-webkit-scrollbar-track {
            background: rgba(26, 30, 26, 0.5);
        }
        .output::-webkit-scrollbar-thumb {
            background: rgba(135, 184, 127, 0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div class="terminal">
    <div class="header">
        <div class="title">OPTIMISTIC TERMINAL</div>
        <div class="status status-connecting" id="status">starting</div>
    </div>
    <div class="output" id="output">
        <div class="line" style="color:#87b87f">─────────────────────────────────────</div>
        <div class="line" style="color:#87b87f">    Optimistic Terminal</div>
        <div class="line" style="color:#87b87f">─────────────────────────────────────</div>
    </div>
    <div class="input-area">
        <span class="prompt" id="prompt">user@optimistic:~$</span>
        <input type="text" class="input" id="input" autofocus>
    </div>
</div>

<script>
(function() {
    let ws = null;
    let connected = false;
    let currentDir = '~';
    let history = [];
    let historyIndex = -1;
    let username = 'user';
    let retries = 0;

    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const prompt = document.getElementById('prompt');
    const statusEl = document.getElementById('status');

    function setStatus(status, text) {
        statusEl.textContent = text;
        statusEl.className = `status status-${status}`;
        connected = status === 'connected';
        input.disabled = !connected;
        if (connected) input.focus();
    }

    function updatePrompt() {
        const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
        prompt.textContent = `${username}@optimistic:${dir}$ `;
    }

    function appendOutput(text, isCmd = false) {
        const div = document.createElement('div');
        div.className = 'line';
        if (isCmd) {
            div.innerHTML = `<span style="color:#87b87f">${prompt.textContent.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            })}</span><span style="color:#b8d8b0">${text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            })}</span>`;
        } else {
            div.textContent = text;
        }
        output.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }

    function sendCommand(cmd) {
        if (!cmd.trim()) return;
        
        history.unshift(cmd);
        historyIndex = -1;
        appendOutput(cmd, true);
        
        if (cmd === 'clear') {
            output.innerHTML = '';
            const welcome = document.createElement('div');
            welcome.className = 'line';
            welcome.style.color = '#87b87f';
            welcome.textContent = '─────────────────────────────────────\n    Optimistic Terminal\n─────────────────────────────────────';
            output.appendChild(welcome);
            return;
        }
        
        if (cmd === 'exit') {
            appendOutput('Closing terminal...');
            setTimeout(() => {
                if (ws) ws.close();
                window.close();
            }, 500);
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(cmd);
        } else {
            appendOutput('Not connected to server');
        }
    }

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.hostname;
        const port = '3001';
        const wsUrl = `${protocol}//${host}:${port}`;
        
        setStatus('connecting', 'connecting');
        
        try {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                setStatus('connected', 'connected');
                retries = 0;
                appendOutput('Terminal ready');
                ws.send('__cwd__');
            };
            
            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    } else if (data.type === 'cwd') {
                        const home = `/home/${username}`;
                        if (data.data === home) {
                            currentDir = '~';
                        } else if (data.data.startsWith(home)) {
                            currentDir = '~' + data.data.substring(home.length);
                        } else {
                            currentDir = data.data;
                        }
                        updatePrompt();
                    }
                } catch(e) {
                    appendOutput(e.data || '');
                }
            };
            
            ws.onerror = () => {
                setStatus('disconnected', 'error');
                appendOutput('WebSocket error - make sure server is running on port 3001');
            };
            
            ws.onclose = () => {
                setStatus('disconnected', 'disconnected');
                appendOutput('Connection lost');
                
                if (retries < 5) {
                    retries++;
                    appendOutput(`Reconnecting in ${retries}s...`);
                    setTimeout(connect, retries * 1000);
                }
            };
        } catch(e) {
            appendOutput('Failed to connect: ' + e.message);
            setStatus('disconnected', 'error');
        }
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value;
            input.value = '';
            sendCommand(cmd);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex < history.length - 1) {
                historyIndex++;
                input.value = history[historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = history[historyIndex];
            } else if (historyIndex === 0) {
                historyIndex = -1;
                input.value = '';
            }
        }
    });

    document.body.addEventListener('click', () => {
        if (!input.disabled) input.focus();
    });

    try {
        const session = JSON.parse(localStorage.getItem('optimistic.session') || 'null');
        if (session && session.name) username = session.name;
    } catch(e) {}

    connect();
})();
</script>
</body>
</html>
