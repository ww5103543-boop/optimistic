<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: transparent;
            --chrome-bg: transparent;
            --chrome-border: rgba(255, 255, 255, 0.15);
            --text: rgba(255, 255, 255, 0.7);
            --text-dim: rgba(255, 255, 255, 0.4);
            --text-bright: rgba(255, 255, 255, 0.95);
        }

        body {
            background: transparent;
            color: var(--text);
            font-family: 'SF Mono', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glass Container - same as browser */
        .terminal-container {
            background: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0;
        }

        /* Header - matches browser tab bar */
        .terminal-header {
            background: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .terminal-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 6px 16px;
        }

        .terminal-title svg {
            width: 18px;
            height: 18px;
        }

        .terminal-title span {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 500;
        }

        .status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .status-connected {
            color: #4ade80;
        }
        .status-disconnected {
            color: #f87171;
        }
        .status-connecting {
            color: #fbbf24;
        }

        /* Output area - matches browser content */
        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: transparent;
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .terminal-line {
            margin-bottom: 2px;
            white-space: pre-wrap;
            word-break: break-all;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Input area - matches browser toolbar */
        .terminal-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: transparent;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .terminal-prompt {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: #4ade80;
            font-family: monospace;
            font-size: 12px;
            white-space: nowrap;
        }

        .terminal-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 8px 14px;
            color: rgba(255, 255, 255, 0.9);
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .terminal-input:focus {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.4);
        }

        .terminal-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar - matches browser */
        .terminal-output::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-output::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .terminal-output::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* ANSI colors */
        .ansi-black { color: #000000; }
        .ansi-red { color: #f87171; }
        .ansi-green { color: #4ade80; }
        .ansi-yellow { color: #fbbf24; }
        .ansi-blue { color: #60a5fa; }
        .ansi-magenta { color: #c084fc; }
        .ansi-cyan { color: #22d3ee; }
        .ansi-white { color: #ffffff; }
        .ansi-bold { font-weight: bold; }
    </style>
</head>
<body>
<div class="terminal-container">
    <div class="terminal-header">
        <div class="terminal-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5">
                <path d="M4 4h16v16H4z"/>
                <path d="M8 8l4 4-4 4"/>
                <path d="M16 16l-4-4 4-4"/>
            </svg>
            <span>OPTIMISTIC TERMINAL</span>
        </div>
        <div class="status status-connecting" id="status">starting</div>
    </div>
    <div class="terminal-output" id="output">
        <div class="terminal-line" style="color:#4ade80">─────────────────────────────────────────</div>
        <div class="terminal-line" style="color:#4ade80">    Optimistic Glass Terminal</div>
        <div class="terminal-line" style="color:#4ade80">─────────────────────────────────────────</div>
        <div class="terminal-line" style="color:#fbbf24">Connecting to backend...</div>
    </div>
    <div class="terminal-input-area">
        <div class="terminal-prompt" id="prompt">user@optimistic:~$</div>
        <input type="text" class="terminal-input" id="input" autofocus>
    </div>
</div>

<script>
let ws = null;
let connected = false;
let currentDir = '~';
let history = [];
let historyIndex = -1;
let username = 'user';
let retries = 0;

const output = document.getElementById('output');
const input = document.getElementById('input');
const prompt = document.getElementById('prompt');
const statusEl = document.getElementById('status');

function stripAnsi(text) {
    let result = text;
    result = result.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
    result = result.replace(/\x1b\([A-Z]/g, '');
    result = result.replace(/\x1b=[0-9]/g, '');
    result = result.replace(/\x1b\]0;[^\x07]*\x07/g, '');
    result = result.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
    return result;
}

function setStatus(status, text) {
    statusEl.textContent = text;
    statusEl.className = `status status-${status}`;
    connected = status === 'connected';
    input.disabled = !connected;
    if (connected) input.focus();
}

function updatePrompt() {
    const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
    prompt.textContent = `${username}@optimistic:${dir}$ `;
}

function appendOutput(text, isCommand = false) {
    const div = document.createElement('div');
    div.className = 'terminal-line';
    const cleanText = stripAnsi(text);
    if (isCommand) {
        div.innerHTML = `<span style="color:#4ade80">${prompt.textContent}</span><span style="color:rgba(255,255,255,0.9)">${escapeHtml(cleanText)}</span>`;
    } else {
        div.textContent = cleanText;
    }
    output.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function sendCommand(cmd) {
    if (!cmd.trim()) return;
    
    history.unshift(cmd);
    historyIndex = -1;
    appendOutput(cmd, true);
    
    if (cmd === 'clear' || cmd === 'cls') {
        output.innerHTML = '';
        const welcome = document.createElement('div');
        welcome.className = 'terminal-line';
        welcome.style.color = '#4ade80';
        welcome.textContent = '─────────────────────────────────────────\n    Optimistic Glass Terminal\n─────────────────────────────────────────';
        output.appendChild(welcome);
        return;
    }
    
    if (cmd === 'exit') {
        appendOutput('Closing terminal...');
        setTimeout(() => {
            if (ws) ws.close();
            window.close();
        }, 500);
        return;
    }
    
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(cmd);
    } else {
        appendOutput('Not connected to terminal server');
    }
}

function connect() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    setStatus('connecting', 'connecting');
    
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
        setStatus('connected', 'connected');
        retries = 0;
        appendOutput('Terminal ready');
        ws.send('__cwd__');
    };
    
    ws.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            if (data.type === 'output') {
                appendOutput(data.data);
            } else if (data.type === 'cwd') {
                const home = `/home/${username}`;
                if (data.data === home) {
                    currentDir = '~';
                } else if (data.data.startsWith(home)) {
                    currentDir = '~' + data.data.substring
