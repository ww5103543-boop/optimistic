<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimistic Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e0a;
            font-family: 'Courier New', 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1e1a;
            padding: 10px 20px;
            border-bottom: 1px solid #2a3a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .terminal-title {
            color: #87b87f;
            font-weight: bold;
            font-size: 14px;
        }

        .connection-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
        }

        .status-connected {
            background: #1a3a1a;
            color: #87b87f;
        }

        .status-disconnected {
            background: #3a1a1a;
            color: #ff5f57;
        }

        .status-connecting {
            background: #3a3a1a;
            color: #febc2e;
        }

        .terminal-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0a0e0a;
        }

        .terminal-line {
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 2px;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: #0d1208;
            border-top: 1px solid #2a3a2a;
            flex-shrink: 0;
        }

        .prompt {
            color: #87b87f;
            font-family: monospace;
            font-size: 13px;
            white-space: nowrap;
        }

        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #b8d8b0;
            font-family: monospace;
            font-size: 13px;
        }

        .input-field:focus {
            outline: none;
        }

        /* Scrollbar styling */
        .terminal-container::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-container::-webkit-scrollbar-track {
            background: #1a1e1a;
        }

        .terminal-container::-webkit-scrollbar-thumb {
            background: #2a3a2a;
            border-radius: 4px;
        }

        .terminal-container::-webkit-scrollbar-thumb:hover {
            background: #3a5a3a;
        }

        /* ANSI color classes */
        .ansi-black { color: #000000; }
        .ansi-red { color: #ff5f57; }
        .ansi-green { color: #87b87f; }
        .ansi-yellow { color: #febc2e; }
        .ansi-blue { color: #6ab0f5; }
        .ansi-magenta { color: #ff5faf; }
        .ansi-cyan { color: #6ab0f5; }
        .ansi-white { color: #ffffff; }
        
        .ansi-bg-black { background-color: #000000; }
        .ansi-bg-red { background-color: #ff5f57; }
        .ansi-bg-green { background-color: #87b87f; }
        .ansi-bg-yellow { background-color: #febc2e; }
        .ansi-bg-blue { background-color: #6ab0f5; }
        .ansi-bg-magenta { background-color: #ff5faf; }
        .ansi-bg-cyan { background-color: #6ab0f5; }
        .ansi-bg-white { background-color: #ffffff; }
        
        .ansi-bold { font-weight: bold; }
        .ansi-underline { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="terminal-header">
        <div class="terminal-title">Optimistic OS Terminal v2.0</div>
        <div class="connection-status status-connecting" id="connection-status">Connecting...</div>
    </div>
    <div class="terminal-container" id="terminal-container">
        <div class="terminal-line">\x1b[32mWelcome to Optimistic OS Terminal\x1b[0m</div>
        <div class="terminal-line">\x1b[33mConnecting to backend...</div>
    </div>
    <div class="terminal-input-line">
        <span class="prompt" id="prompt">user@optimistic:~$</span>
        <input type="text" class="input-field" id="command-input" autofocus>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let currentDir = '~';
        let commandHistory = [];
        let historyIndex = -1;
        let inputBuffer = '';
        let reconnectAttempts = 0;
        let userInfo = { name: 'user', hostname: 'optimistic' };

        const container = document.getElementById('terminal-container');
        const inputField = document.getElementById('command-input');
        const promptSpan = document.getElementById('prompt');
        const statusSpan = document.getElementById('connection-status');

        function parseANSICodes(text) {
            let html = text;
            // Reset
            html = html.replace(/\x1b\[0m/g, '</span>');
            // Colors
            html = html.replace(/\x1b\[32m/g, '<span class="ansi-green">');
            html = html.replace(/\x1b\[31m/g, '<span class="ansi-red">');
            html = html.replace(/\x1b\[33m/g, '<span class="ansi-yellow">');
            html = html.replace(/\x1b\[34m/g, '<span class="ansi-blue">');
            html = html.replace(/\x1b\[35m/g, '<span class="ansi-magenta">');
            html = html.replace(/\x1b\[36m/g, '<span class="ansi-cyan">');
            html = html.replace(/\x1b\[37m/g, '<span class="ansi-white">');
            html = html.replace(/\x1b\[1m/g, '<span class="ansi-bold">');
            html = html.replace(/\x1b\[4m/g, '<span class="ansi-underline">');
            // Backgrounds
            html = html.replace(/\x1b\[41m/g, '<span class="ansi-bg-red">');
            html = html.replace(/\x1b\[42m/g, '<span class="ansi-bg-green">');
            html = html.replace(/\x1b\[43m/g, '<span class="ansi-bg-yellow">');
            html = html.replace(/\x1b\[44m/g, '<span class="ansi-bg-blue">');
            
            return html;
        }

        function updateStatus(status, message) {
            statusSpan.textContent = message;
            if (status === 'connected') {
                statusSpan.className = 'connection-status status-connected';
                isConnected = true;
            } else if (status === 'disconnected') {
                statusSpan.className = 'connection-status status-disconnected';
                isConnected = false;
            } else {
                statusSpan.className = 'connection-status status-connecting';
                isConnected = false;
            }
        }

        function appendOutput(text, isError = false) {
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            // Handle ANSI codes
            let processedText = parseANSICodes(text);
            // Handle plain text fallback
            processedText = processedText.replace(/\\x1b\[(\d+)m/g, '');
            
            line.innerHTML = processedText;
            if (isError) {
                line.style.color = '#ff5f57';
            }
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        function updatePrompt() {
            const dir = currentDir === '~' ? '~' : currentDir.split('/').pop();
            promptSpan.innerHTML = `${userInfo.name}@${userInfo.hostname}:${dir}$ `;
        }

        function sendCommand(cmd) {
            if (!cmd.trim()) return;
            
            // Add to history
            commandHistory.unshift(cmd);
            historyIndex = -1;
            
            // Echo command in terminal
            const promptText = `${userInfo.name}@${userInfo.hostname}:${currentDir === '~' ? '~' : currentDir.split('/').pop()}$ `;
            const cmdLine = document.createElement('div');
            cmdLine.className = 'terminal-line';
            cmdLine.innerHTML = `<span style="color:#87b87f">${promptText}</span><span style="color:#b8d8b0">${escapeHtml(cmd)}</span>`;
            container.appendChild(cmdLine);
            container.scrollTop = container.scrollHeight;
            
            // Handle built-in commands locally
            if (cmd === 'clear' || cmd === 'cls') {
                container.innerHTML = '';
                return;
            }
            
            if (cmd === 'exit') {
                appendOutput('\x1b[33mClosing terminal...\x1b[0m');
                setTimeout(() => window.close(), 500);
                return;
            }
            
            // Send to WebSocket
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(cmd);
            } else {
                appendOutput('\x1b[31m✗ Not connected to backend. Make sure server is running.\x1b[0m');
                appendOutput('\x1b[33mRun: node server.js\x1b[0m');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            updateStatus('connecting', 'Connecting...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('connected', 'Connected');
                reconnectAttempts = 0;
                appendOutput('\x1b[32m✓ Connected to Optimistic OS Terminal Backend\x1b[0m');
                appendOutput('\x1b[36mType "help" for available commands. Type "exit" to close.\x1b[0m');
                appendOutput('');
                
                // Request current directory
                ws.send('__GET_CWD__');
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'output') {
                        appendOutput(data.data);
                    } else if (data.type === 'cwd') {
                        // Convert to ~ format if in home directory
                        const homeDir = process.env.HOME || process.env.USERPROFILE;
                        if (data.data === homeDir) {
                            currentDir = '~';
                        } else if (data.data.startsWith(homeDir)) {
                            currentDir = '~' + data.data.substring(homeDir.length);
                        } else {
                            currentDir = data.data;
                        }
                        updatePrompt();
                    } else if (data.type === 'ready') {
                        appendOutput(data.data);
                    }
                } catch (e) {
                    // Plain text output
                    appendOutput(event.data);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                appendOutput('\x1b[31m✗ WebSocket error\x1b[0m');
                updateStatus('disconnected', 'Error');
            };
            
            ws.onclose = () => {
                updateStatus('disconnected', 'Disconnected');
                appendOutput('\x1b[31m✗ Disconnected from terminal backend\x1b[0m');
                
                // Auto reconnect
                if (reconnectAttempts < 5) {
                    reconnectAttempts++;
                    appendOutput(`\x1b[33m⚠ Reconnecting in 3 seconds... (attempt ${reconnectAttempts}/5)\x1b[0m`);
                    setTimeout(() => connectWebSocket(), 3000);
                } else {
                    appendOutput('\x1b[31m✗ Failed to reconnect. Please restart the server.\x1b[0m');
                    appendOutput('\x1b[33mRun: node server.js\x1b[0m');
                }
            };
        }

        // Handle input events
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputField.value;
                inputField.value = '';
                sendCommand(cmd);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    inputField.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    inputField.value = commandHistory[historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    inputField.value = '';
                }
            } else if (e.key === 'l' && e.ctrlKey) {
                e.preventDefault();
                container.innerHTML = '';
                appendOutput('\x1b[32mCleared\x1b[0m');
            }
        });

        // Focus input on any click
        document.body.addEventListener('click', () => {
            inputField.focus();
        });

        // Get user info from localStorage if available
        try {
            const session = JSON.parse(localStorage.getItem('optimistic.session') || 'null');
            if (session && session.name) {
                userInfo.name = session.name;
            }
        } catch(e) {}

        // Connect on load
        connectWebSocket();
    </script>
</body>
</html>
